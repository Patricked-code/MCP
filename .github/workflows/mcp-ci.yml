name: MCP CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'mcp/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Docs check
        run: npm run docs:check

      - name: Secret scan
        run: npm run lint:secrets --if-present

      - name: Read-only safety tests
        run: npm run test:readonly-safety

      - name: Whitespace diff check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            git show --check --format=fuller "${{ github.sha }}"
          else
            git diff --check "${{ github.event.before }}...${{ github.sha }}"
          fi
